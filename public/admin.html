<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搭子行 · 管理后台</title>
    <!-- 已移除 Google Fonts，使用系统字体 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sidebar-bg: #222b45;
      --sidebar-hover: #1a1f33;
      --sidebar-active: #192038;
      --sidebar-text: #a4abbd;
      --sidebar-text-active: #fff;
      --accent: #3366ff;
      --accent-light: #e4e9ff;
      --danger: #ff3d71;
      --warning: #ffaa00;
      --success: #00d68f;
      --info: #0095ff;
      --bg: #edf1f7;
      --card-bg: #fff;
      --card-shadow: 0 0.5rem 1rem 0 rgba(44,51,73,0.1);
      --text: #222b45;
      --text-hint: #8f9bb3;
      --border: #e4e9f2;
      --radius: 0.25rem;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 256px; min-width: 256px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex; flex-direction: column;
      height: 100vh; position: sticky; top: 0;
      box-shadow: 0 0.5rem 1rem 0 rgba(44,51,73,0.1);
      z-index: 100;
    }
    .sidebar-brand {
      padding: 24px 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-brand .brand-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff;
    }
    .sidebar-brand .brand-text {
      font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px;
    }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .sidebar-nav .nav-section {
      padding: 16px 20px 6px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: rgba(255,255,255,0.3);
    }
    .sidebar-nav .nav-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; margin: 2px 8px;
      border-radius: 4px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--sidebar-text);
      transition: all 0.15s; border: none; background: none;
      width: calc(100% - 16px); font-family: inherit; text-align: left;
      text-decoration: none;
    }
    .sidebar-nav .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar-nav .nav-item.active {
      background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(51,102,255,0.4);
    }
    .sidebar-nav .nav-item i { width: 20px; text-align: center; font-size: 16px; }
    .sidebar-footer {
      padding: 16px; border-top: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-footer .nav-item { width: 100%; }

    /* ---- Main Content ---- */
    .main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }

    /* ---- Header ---- */
    .header {
      background: #fff; padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 0.5rem 1rem 0 rgba(44,51,73,0.05);
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-btn {
      padding: 8px 16px; border-radius: var(--radius); font-size: 14px;
      font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text-hint); font-family: inherit;
      transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .header-btn:hover { background: var(--bg); color: var(--text); }
    .header-btn.danger { border-color: var(--danger); color: var(--danger); }
    .header-btn.danger:hover { background: var(--danger); color: #fff; }

    /* ---- Page Content ---- */
    .content { flex: 1; padding: 24px 32px; overflow-y: auto; }

    /* ---- Auth Gate ---- */
    #auth-gate {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg);
    }
    #auth-gate .auth-card {
      background: var(--card-bg); border-radius: 8px;
      padding: 48px 40px; width: 100%; max-width: 440px;
      box-shadow: var(--card-shadow); text-align: center;
    }
    #auth-gate .auth-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; color: #fff; margin-bottom: 20px;
    }
    #auth-gate h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    #auth-gate p { color: var(--text-hint); font-size: 14px; margin-bottom: 28px; }
    #auth-gate input {
      width: 100%; padding: 12px 16px; font-size: 15px;
      border: 1px solid var(--border); border-radius: var(--radius);
      outline: none; font-family: inherit;
      transition: border-color 0.2s; margin-bottom: 20px;
    }
    #auth-gate input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    #auth-gate .btn {
      width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
      border: none; border-radius: var(--radius); cursor: pointer;
      font-family: inherit; background: var(--accent); color: #fff;
      transition: all 0.15s;
    }
    #auth-gate .btn:hover { background: #2749db; }
    #auth-gate .auth-msg { margin-top: 16px; font-size: 13px; }

    /* ---- Cards ---- */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
      margin-bottom: 24px;
    }
    @media (max-width: 1200px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .stats-row { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--card-bg); border-radius: 8px; padding: 24px;
      box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 16px;
    }
    .stat-card .stat-icon-wrap {
      width: 56px; height: 56px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: #fff; flex-shrink: 0;
    }
    .stat-card .stat-icon-wrap.blue { background: var(--info); }
    .stat-card .stat-icon-wrap.green { background: var(--success); }
    .stat-card .stat-icon-wrap.orange { background: var(--warning); }
    .stat-card .stat-icon-wrap.purple { background: #7c3aed; }
    .stat-card .stat-body { min-width: 0; }
    .stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-card .stat-label { font-size: 13px; color: var(--text-hint); margin-top: 4px; font-weight: 600; }

    .card {
      background: var(--card-bg); border-radius: 8px; padding: 24px;
      box-shadow: var(--card-shadow); margin-bottom: 24px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title { font-size: 18px; font-weight: 700; color: var(--text); }

    /* ---- Msg / Toast ---- */
    .toast {
      position: fixed; top: 24px; right: 24px; z-index: 300;
      padding: 14px 24px; border-radius: 8px; font-weight: 600; font-size: 14px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      max-width: 380px;
    }
    .toast.show { opacity: 1; pointer-events: auto; }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }

    /* ---- Table (nb-table style) ---- */
    table {
      width: 100%; border-collapse: collapse;
    }
    table thead th {
      text-align: left; padding: 14px 16px; font-size: 12px;
      font-weight: 800; color: var(--text-hint); text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 2px solid var(--border);
    }
    table tbody td {
      padding: 16px; border-bottom: 1px solid var(--border);
      font-size: 14px; vertical-align: middle;
    }
    table tbody tr:hover { background: #f7f9fc; }

    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 700;
    }
    .badge-warning { background: #fff3cd; color: #856404; }
    .badge-danger { background: #fce4ec; color: var(--danger); }
    .badge-success { background: #e0f7ee; color: #00b383; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; font-size: 13px; font-weight: 700;
      border-radius: var(--radius); border: none; cursor: pointer;
      font-family: inherit; transition: all 0.15s; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2749db; }
    .btn-outline { background: transparent; color: var(--text-hint); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-warning { background: transparent; color: var(--warning); border: 1px solid var(--warning); }
    .btn-warning:hover { background: var(--warning); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ---- Form ---- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 800; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; font-size: 14px;
      border: 1px solid var(--border); border-radius: var(--radius);
      outline: none; font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-hint); font-size: 14px; }
    .tab-panel { display: block; }
    .tab-panel.hidden { display: none; }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card-bg); border-radius: 8px; padding: 32px;
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 1rem 2rem rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

    /* ---- Activity type icons ---- */
    .type-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
    }
    .mr-2 { margin-right: 8px; }

    /* 敏感词提示 */
    .sensitive-tip {
      font-size: 12px; margin-top: 4px; min-height: 18px; transition: all 0.2s;
    }
    .sensitive-tip.warn { color: var(--danger); font-weight: 600; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ==================== Auth Gate ==================== -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-icon">🛡️</div>
    <h2>搭子行 管理后台</h2>
    <p>请输入管理员密码以继续</p>
    <input type="password" id="admin-pass" placeholder="管理员密码" autocomplete="off">
    <button class="btn" id="auth-submit">验证进入</button>
    <p class="auth-msg" id="auth-msg"></p>
  </div>
</div>

<!-- ==================== Admin Layout ==================== -->
<div id="admin-layout" style="display:none; width:100%;">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
      <span class="brand-text">搭子行管理</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">菜单</div>
      <button class="nav-item active" data-tab="dashboard"><i class="fas fa-grid-2"></i>概览</button>
      <button class="nav-item" data-tab="activities"><i class="fas fa-calendar-alt"></i>活动管理</button>
      <button class="nav-item" data-tab="users"><i class="fas fa-people"></i>用户管理</button>
      <button class="nav-item" data-tab="students"><i class="fas fa-id-card"></i>学号管理</button>
      <button class="nav-item" data-tab="announcements"><i class="fas fa-bullhorn"></i>系统公告</button>
      <button class="nav-item" data-tab="export"><i class="fas fa-download"></i>数据导出</button>
    </nav>
    <div class="sidebar-footer">
      <a href="/home.html" class="nav-item"><i class="fas fa-arrow-left"></i>返回首页</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <div class="header-left">
        <span class="header-title" id="current-page-title">概览</span>
      </div>
      <div class="header-actions">
        <button class="header-btn danger" id="logout-btn"><i class="fas fa-sign-out-alt"></i>退出登录</button>
      </div>
    </header>

    <div class="content">

      <!-- ===== Dashboard Tab ===== -->
      <div class="tab-panel" id="panel-dashboard">
        <div class="stats-row" id="stats-row"></div>
        <div class="card">
          <div class="card-header"><span class="card-title">最近活动</span></div>
          <div id="recent-activities"><div class="empty-state">加载中...</div></div>
        </div>
      </div>

      <!-- ===== Activities Tab ===== -->
      <div class="tab-panel hidden" id="panel-activities">
        <div class="card">
          <div class="card-header"><span class="card-title">发布新活动</span></div>
          <form id="create-form">
            <div class="form-grid">
              <div class="form-group">
                <label>活动标题 *</label>
                <input type="text" id="create-title" placeholder="例如：青云山徒步" required>
                <div class="sensitive-tip" id="admin-tip-title"></div>
              </div>
              <div class="form-group">
                <label>活动类型 *</label>
                <select id="create-type" required>
                  <option value="">请选择</option>
                  <option value="徒步">徒步</option><option value="骑行">骑行</option>
                  <option value="露营">露营</option><option value="跑步">跑步</option>
                  <option value="篮球">篮球</option><option value="足球">足球</option>
                  <option value="羽毛球">羽毛球</option><option value="桌游">桌游</option>
                  <option value="自习">自习</option><option value="聚餐">聚餐</option>
                  <option value="其他">其他</option>
                </select>
              </div>
              <div class="form-group">
                <label>日期时间 *</label>
                <input type="text" id="create-date" placeholder="2026/07/20 08:00" required>
              </div>
              <div class="form-group">
                <label>地点 *</label>
                <input type="text" id="create-location" placeholder="例如：青云山区" required>
                <div class="sensitive-tip" id="admin-tip-location"></div>
              </div>
              <div class="form-group">
                <label>最大人数</label>
                <input type="number" id="create-max" placeholder="10" value="10" min="2" max="100">
              </div>
              <div class="form-group">
                <label>描述</label>
                <textarea id="create-desc" placeholder="描述一下这次活动吧..."></textarea>
                <div class="sensitive-tip" id="admin-tip-desc"></div>
              </div>
            </div>
            <div class="sensitive-tip" id="admin-tip-global"></div>
            <button type="submit" class="btn btn-primary" id="admin-create-btn" style="margin-top:8px;">🚀 发布活动</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">全部活动</span></div>
          <div id="activity-list"><div class="empty-state">加载中...</div></div>
        </div>
      </div>

      <!-- ===== Users Tab ===== -->
      <div class="tab-panel hidden" id="panel-users">
        <div class="card">
          <div class="card-header"><span class="card-title">注册用户</span></div>
          <div id="user-list"><div class="empty-state">加载中...</div></div>
        </div>
      </div>

      <!-- ===== Students Tab ===== -->
      <div class="tab-panel hidden" id="panel-students">
        <div class="card">
          <div class="card-header">
            <span class="card-title">学号列表（预注册）</span>
            <button class="btn btn-danger btn-sm" id="clear-students-btn"><i class="fas fa-trash"></i> 清空</button>
          </div>
          <div id="student-list"><div class="empty-state">加载中...</div></div>
        </div>
      </div>

      <!-- ===== Announcements Tab ===== -->
      <div class="tab-panel hidden" id="panel-announcements">
        <div class="card">
          <div class="card-header"><span class="card-title">发布新公告</span></div>
          <form id="announce-form">
            <div class="form-group">
              <label>公告标题 *</label>
              <input type="text" id="announce-title" placeholder="输入公告标题" required>
            </div>
            <div class="form-group">
              <label>公告内容 *</label>
              <textarea id="announce-content" placeholder="输入公告内容..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-bullhorn"></i> 发布公告</button>
          </form>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">已发布公告</span></div>
          <div id="announce-list"><div class="empty-state">加载中...</div></div>
        </div>
      </div>

      <!-- ===== Export Tab ===== -->
      <div class="tab-panel hidden" id="panel-export">
        <div class="card">
          <div class="card-header"><span class="card-title">数据导出</span></div>
          <p style="color:var(--text-hint); font-size:14px; margin-bottom:20px;">导出数据为CSV格式，可直接用Excel打开</p>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a href="/api/admin/export/users" class="btn btn-primary" id="export-users-btn" target="_blank"><i class="fas fa-users"></i> 导出用户数据</a>
            <a href="/api/admin/export/activities" class="btn btn-primary" id="export-activities-btn" target="_blank"><i class="fas fa-calendar-alt"></i> 导出活动数据</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ==================== Edit Modal ==================== -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ 编辑活动</h3>
    <form id="edit-form">
      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <div class="form-group">
          <label>活动标题</label>
          <input type="text" id="edit-title" required>
        </div>
        <div class="form-group">
          <label>类型</label>
          <select id="edit-type">
            <option value="徒步">徒步</option><option value="骑行">骑行</option>
            <option value="露营">露营</option><option value="跑步">跑步</option>
            <option value="篮球">篮球</option><option value="足球">足球</option>
            <option value="羽毛球">羽毛球</option><option value="桌游">桌游</option>
            <option value="自习">自习</option><option value="聚餐">聚餐</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>日期时间</label>
          <input type="text" id="edit-date">
        </div>
        <div class="form-group">
          <label>地点</label>
          <input type="text" id="edit-location">
        </div>
        <div class="form-group">
          <label>最大人数</label>
          <input type="number" id="edit-max" min="1" max="100">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>描述</label>
          <textarea id="edit-desc"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="edit-cancel">取消</button>
        <button type="submit" class="btn btn-primary">保存修改</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ========== Constants ==========
  const typeIcons = {
    '徒步': { color: '#2e7d32' },
    '骑行': { color: '#1565c0' },
    '露营': { color: '#e65100' },
    '跑步': { color: '#c62828' },
    '篮球': { color: '#f57f17' },
    '足球': { color: '#283593' },
    '羽毛球': { color: '#6a1b9a' },
    '桌游': { color: '#00695c' },
    '自习': { color: '#424242' },
    '聚餐': { color: '#b71c1c' },
    '其他': { color: '#4527a0' }
  };

  const ADMIN_TOKEN_KEY = 'dzh_admin_token';
  let adminToken = localStorage.getItem(ADMIN_TOKEN_KEY);

  // ========== Toast ==========
  function showToast(text, type) {
    const t = document.getElementById('toast');
    t.textContent = text; t.className = 'toast ' + type + ' show';
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function getHeaders() {
    return adminToken ? {
      'Content-Type': 'application/json',
      'X-Admin-Token': adminToken
    } : { 'Content-Type': 'application/json' };
  }

  // ========== Auth ==========
  async function tryAutoAuth() {
    if (!adminToken) return false;
    try {
      const res = await fetch('/api/admin/stats', { headers: getHeaders() });
      return (await res.json()).success;
    } catch { return false; }
  }

  function showPanel() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('admin-layout').style.display = 'flex';
    loadDashboard();
  }

  document.getElementById('auth-submit').addEventListener('click', async () => {
    const pass = document.getElementById('admin-pass').value;
    const msg = document.getElementById('auth-msg');
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      });
      const json = await res.json();
      if (json.success) {
        adminToken = json.data.token;
        localStorage.setItem(ADMIN_TOKEN_KEY, adminToken);
        showPanel();
      } else {
        msg.style.color = '#ff3d71'; msg.textContent = json.message;
      }
    } catch {
      msg.style.color = '#ff3d71'; msg.textContent = '网络错误，请确保服务器已启动';
    }
  });
  document.getElementById('auth-gate').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-submit').click();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem(ADMIN_TOKEN_KEY);
    adminToken = null;
    document.getElementById('admin-layout').style.display = 'none';
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('admin-pass').value = '';
    document.getElementById('auth-msg').textContent = '';
  });

  // ========== Tab Navigation ==========
  const tabMap = { dashboard: '概览', activities: '活动管理', users: '用户管理', students: '学号管理', announcements: '系统公告', export: '数据导出' };
  document.querySelectorAll('.sidebar .nav-item[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sidebar .nav-item[data-tab]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('current-page-title').textContent = tabMap[tab] || tab;
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel-' + tab).classList.remove('hidden');
      if (tab === 'dashboard') loadDashboard();
      if (tab === 'activities') loadActivities();
      if (tab === 'users') loadUsers();
      if (tab === 'students') loadStudents();
      if (tab === 'announcements') loadAnnouncements();
      if (tab === 'export') setupExportLinks();
    });
  });

  // ========== Dashboard ==========
  async function loadDashboard() {
    const statsRow = document.getElementById('stats-row');
    const recentDiv = document.getElementById('recent-activities');
    try {
      const res = await fetch('/api/admin/stats', { headers: getHeaders() });
      const json = await res.json();
      if (!json.success) return;
      const d = json.data;

      statsRow.innerHTML = `
        <div class="stat-card">
          <div class="stat-icon-wrap blue"><i class="fas fa-people"></i></div>
          <div class="stat-body"><div class="stat-value">${d.totalUsers}</div><div class="stat-label">注册用户</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon-wrap green"><i class="fas fa-calendar-check"></i></div>
          <div class="stat-body"><div class="stat-value">${d.totalActivities}</div><div class="stat-label">总活动数</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon-wrap orange"><i class="fas fa-user-check"></i></div>
          <div class="stat-body"><div class="stat-value">${d.totalParticipants}</div><div class="stat-label">参与人次</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon-wrap purple"><i class="fas fa-calendar-plus"></i></div>
          <div class="stat-body"><div class="stat-value">${d.todayNew ?? '-'}</div><div class="stat-label">今日新增</div></div>
        </div>`;

      if (!d.recentActivities || d.recentActivities.length === 0) {
        recentDiv.innerHTML = '<div class="empty-state">暂无活动</div>'; return;
      }
      recentDiv.innerHTML = `<table>
        <thead><tr><th>活动</th><th>类型</th><th>日期</th><th>地点</th><th>人数</th></tr></thead>
        <tbody>${d.recentActivities.map(a => {
          const tc = typeIcons[a.type] || typeIcons['其他'];
          return `<tr>
            <td><strong>${esc(a.title)}</strong></td>
            <td><span class="badge badge-success" style="background:${tc.color}15;color:${tc.color};">${esc(a.type)}</span></td>
            <td>${esc(a.date)}</td>
            <td>${esc(a.location)}</td>
            <td><strong>${a.currentParticipants}/${a.maxParticipants}</strong></td>
          </tr>`;
        }).join('')}</tbody></table>`;
    } catch { /* noop */ }
  }

  // ========== Activities ==========
  async function loadActivities() {
    const container = document.getElementById('activity-list');
    try {
      const res = await fetch('/api/activities');
      const json = await res.json();
      const acts = json.data || [];
      if (acts.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无活动，快去发布第一个吧 🎉</div>'; return;
      }
      container.innerHTML = `<table>
        <thead><tr><th>活动</th><th>类型</th><th>日期</th><th>地点</th><th>人数</th><th>操作</th></tr></thead>
        <tbody>${acts.map(a => {
          const tc = typeIcons[a.type] || typeIcons['其他'];
          return `<tr>
            <td><strong>${esc(a.title)}</strong></td>
            <td><span class="badge badge-success" style="background:${tc.color}15;color:${tc.color};">${esc(a.type)}</span></td>
            <td>${esc(a.date)}</td>
            <td>${esc(a.location)}</td>
            <td><strong>${a.currentParticipants}/${a.maxParticipants}</strong></td>
            <td>
              <button class="btn btn-outline btn-sm mr-2" onclick="openEdit('${a.id}')"><i class="fas fa-edit"></i> 编辑</button>
              <button class="btn btn-danger btn-sm" onclick="adminDeleteActivity('${a.id}')"><i class="fas fa-trash"></i> 删除</button>
            </td>
          </tr>`;
        }).join('')}</tbody></table>`;
    } catch {
      container.innerHTML = '<div class="empty-state">加载失败，请刷新</div>';
    }
  }

  // ========== Create Activity ==========
  document.getElementById('create-form').addEventListener('submit', async e => {
    e.preventDefault();
      const body = {
      title: document.getElementById('create-title').value.trim(),
      type: document.getElementById('create-type').value,
      date: document.getElementById('create-date').value.trim(),
      location: document.getElementById('create-location').value.trim(),
      maxParticipants: document.getElementById('create-max').value,
      description: document.getElementById('create-desc').value.trim()
    };
    try {
      const res = await fetch('/api/admin/activities', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        document.getElementById('create-form').reset();
        document.getElementById('create-max').value = '10';
        loadActivities();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  });

  // ========== Admin Delete ==========
  async function adminDeleteActivity(id) {
    if (!confirm('确定要删除这个活动吗？此操作不可撤销。')) return;
    try {
      const res = await fetch('/api/admin/activities/' + id, {
        method: 'DELETE',
        headers: getHeaders()
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        loadActivities();
        loadDashboard();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  }

  // ========== Edit Modal ==========
  async function openEdit(id) {
    const res = await fetch('/api/activities/' + id);
    const json = await res.json();
    if (!json.success) { showToast(json.message, 'error'); return; }
    const a = json.data;
    document.getElementById('edit-id').value = a.id;
    document.getElementById('edit-title').value = a.title;
    document.getElementById('edit-type').value = a.type;
    document.getElementById('edit-date').value = a.date;
    document.getElementById('edit-location').value = a.location;
    document.getElementById('edit-max').value = a.maxParticipants;
    document.getElementById('edit-desc').value = a.description || '';
    document.getElementById('edit-modal').classList.add('show');
  }

  document.getElementById('edit-cancel').addEventListener('click', () => {
    document.getElementById('edit-modal').classList.remove('show');
  });
  document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-modal')) {
      document.getElementById('edit-modal').classList.remove('show');
    }
  });

  document.getElementById('edit-form').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const body = {
      title: document.getElementById('edit-title').value.trim(),
      type: document.getElementById('edit-type').value,
      date: document.getElementById('edit-date').value.trim(),
      location: document.getElementById('edit-location').value.trim(),
      maxParticipants: document.getElementById('edit-max').value,
      description: document.getElementById('edit-desc').value.trim()
    };
    try {
      const res = await fetch('/api/admin/activities/' + id, {
        method: 'PUT',
        headers: getHeaders(),
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        document.getElementById('edit-modal').classList.remove('show');
        loadActivities();
        loadDashboard();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  });

  // ========== Users ==========
  async function loadUsers() {
    const container = document.getElementById('user-list');
    try {
      const res = await fetch('/api/admin/users', { headers: getHeaders() });
      const json = await res.json();
      if (!json.success) { container.innerHTML = '<div class="empty-state">加载失败</div>'; return; }
      const userList = json.data || [];
      if (userList.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无注册用户</div>'; return;
      }
      container.innerHTML = `<table>
        <thead><tr><th>用户</th><th>手机号</th><th>注册时间</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${userList.map(u => {
          const created = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '未知';
          const statusBadge = u.banned
            ? '<span class="badge badge-danger">已封禁</span>'
            : '<span class="badge badge-success">正常</span>';
          return `<tr>
            <td><strong>${esc(u.nickname)}</strong></td>
            <td>${esc(u.phone)}</td>
            <td>${created}</td>
            <td>${statusBadge}</td>
            <td>
              <button class="btn ${u.banned ? 'btn-primary' : 'btn-warning'} btn-sm" onclick="toggleBan('${u.phone}')">
                ${u.banned ? '<i class="fas fa-unlock"></i> 解封' : '<i class="fas fa-ban"></i> 封禁'}
              </button>
            </td>
          </tr>`;
        }).join('')}</tbody></table>`;
    } catch {
      container.innerHTML = '<div class="empty-state">加载失败，请刷新</div>';
    }
  }

  async function toggleBan(phone) {
    try {
      const res = await fetch('/api/admin/users/' + phone, {
        method: 'PUT',
        headers: getHeaders()
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        loadUsers();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ========== Students ==========
  async function loadStudents() {
    const container = document.getElementById('student-list');
    try {
      const res = await fetch('/api/admin/students', { headers: getHeaders() });
      const json = await res.json();
      if (!json.success) { container.innerHTML = '<div class="empty-state">加载失败</div>'; return; }
      const ids = json.data || [];
      if (ids.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无预注册学号</div>';
        return;
      }
      container.innerHTML = `<table>
        <thead><tr><th>#</th><th>学号</th></tr></thead>
        <tbody>${ids.map((id, i) => {
          return `<tr><td>${i + 1}</td><td><strong>${esc(id)}</strong></td></tr>`;
        }).join('')}</tbody></table>
        <p style="margin-top:12px; color:var(--text-hint); font-size:13px;">共 ${ids.length} 个学号</p>`;
    } catch {
      container.innerHTML = '<div class="empty-state">加载失败，请刷新</div>';
    }
  }

  document.getElementById('clear-students-btn').addEventListener('click', async () => {
    if (!confirm('确定要清空所有学号数据吗？此操作不可撤销。')) return;
    try {
      const res = await fetch('/api/admin/students', {
        method: 'DELETE',
        headers: getHeaders()
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        loadStudents();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  });

  // ========== Announcements ==========
  async function loadAnnouncements() {
    const container = document.getElementById('announce-list');
    try {
      const res = await fetch('/api/announcements');
      const json = await res.json();
      if (!json.success) { container.innerHTML = '<div class="empty-state">加载失败</div>'; return; }
      const list = json.data || [];
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无公告</div>';
        return;
      }
      container.innerHTML = list.map(a => {
        const date = a.createdAt ? new Date(a.createdAt).toLocaleString('zh-CN') : '';
        return `<div style="padding:16px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="flex:1;">
            <div style="font-weight:700; font-size:15px; margin-bottom:6px;">${esc(a.title)}</div>
            <div style="color:var(--text-hint); font-size:13px; margin-bottom:4px;">${esc(a.content)}</div>
            <div style="color:#bbb; font-size:12px;">${date}</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteAnnouncement('${a.id}')" style="margin-left:12px; flex-shrink:0;"><i class="fas fa-trash"></i></button>
        </div>`;
      }).join('');
    } catch {
      container.innerHTML = '<div class="empty-state">加载失败，请刷新</div>';
    }
  }

  document.getElementById('announce-form').addEventListener('submit', async e => {
    e.preventDefault();
    const title = document.getElementById('announce-title').value.trim();
    const content = document.getElementById('announce-content').value.trim();
    try {
      const res = await fetch('/api/admin/announcements', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({ title, content })
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        document.getElementById('announce-form').reset();
        loadAnnouncements();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  });

  async function deleteAnnouncement(id) {
    if (!confirm('确定要删除这条公告吗？')) return;
    try {
      const res = await fetch('/api/admin/announcements/' + id, {
        method: 'DELETE',
        headers: getHeaders()
      });
      const json = await res.json();
      if (json.success) {
        showToast(json.message, 'success');
        loadAnnouncements();
      } else {
        showToast(json.message, 'error');
      }
    } catch {
      showToast('网络错误', 'error');
    }
  }

  // ========== Export ==========
  function setupExportLinks() {
    // 在导出链接上附加admin token作为query参数
    const usersBtn = document.getElementById('export-users-btn');
    const actsBtn = document.getElementById('export-activities-btn');
    if (adminToken) {
      usersBtn.href = '/api/admin/export/users?token=' + adminToken;
      actsBtn.href = '/api/admin/export/activities?token=' + adminToken;
    }
  }

  // ========== Init ==========
  (async () => {
    if (await tryAutoAuth()) { showPanel(); }
  })();

  // ========== 敏感词实时检测 ==========
  var _adminCheckTimer = null;
  var adminSubmitBtn = document.getElementById('admin-create-btn');
  var adminTipTitle = document.getElementById('admin-tip-title');
  var adminTipLocation = document.getElementById('admin-tip-location');
  var adminTipDesc = document.getElementById('admin-tip-desc');

  function adminCheckSensitive(text, tipEl) {
    clearTimeout(_adminCheckTimer);
    if (!text || !text.trim()) {
      if (tipEl) { tipEl.textContent = ''; tipEl.className = 'sensitive-tip'; }
      adminSubmitBtn.disabled = false;
      return;
    }
    _adminCheckTimer = setTimeout(async function() {
      try {
        var resp = await fetch('/api/check-sensitive', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.trim() })
        });
        var data = await resp.json();
        if (data.success && data.data.hasSensitive) {
          if (tipEl) { tipEl.textContent = '⚠️ 内容包含敏感词，请修改后再提交'; tipEl.className = 'sensitive-tip warn'; }
          adminSubmitBtn.disabled = true;
        } else {
          if (tipEl) { tipEl.textContent = ''; tipEl.className = 'sensitive-tip'; }
          adminSubmitBtn.disabled = false;
        }
      } catch (e) {
        if (tipEl) { tipEl.textContent = ''; tipEl.className = 'sensitive-tip'; }
        adminSubmitBtn.disabled = false;
      }
    }, 500);
  }

  document.getElementById('create-title').addEventListener('input', function() {
    adminCheckSensitive(this.value, adminTipTitle);
  });
  document.getElementById('create-location').addEventListener('input', function() {
    adminCheckSensitive(this.value, adminTipLocation);
  });
  document.getElementById('create-desc').addEventListener('input', function() {
    adminCheckSensitive(this.value, adminTipDesc);
  });
</script>
</body>
</html>
