<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>登录 / 注册 - 搭子行</title>
  <link rel="stylesheet" href="common.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
      background: linear-gradient(180deg, #f8f9ff 0%, #f0f1ff 40%, #eef0ff 100%);
      color: #111;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: 100%; max-width: 480px; margin: 0 auto;
      padding: 0 24px;
      display: flex; flex-direction: column;
      min-height: 100vh; min-height: 100dvh;
    }

    /* ---------- Header ---------- */
    .top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0 0;
    }
    .back { color: #8b8fe8; text-decoration: none; font-size: 15px; font-weight: 600; }
    .pill {
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid #d9dcff; color: #8b8fe8;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.8);
    }

    /* ---------- Card ---------- */
    .card {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      padding: 20px 0 40px;
    }
    .card-inner {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 28px;
      padding: 36px 28px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.05);
    }

    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-area h1 { font-size: 30px; font-weight: 900; }
    .logo-area p { color: #888; font-size: 16px; margin-top: 8px; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 15px; font-weight: 600;
      color: #444; margin-bottom: 8px;
    }
    .phone-row { display: flex; gap: 10px; }
    .phone-row input { flex: 1; }

    input {
      width: 100%; padding: 16px 18px;
      font-size: 17px; border: 1px solid #ddd;
      border-radius: 14px; outline: none;
      background: #fff; font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #8b8fe8; }

    .send-code-btn {
      white-space: nowrap; padding: 0 18px;
      font-size: 15px; font-weight: 600;
      border: 1px solid #8b8fe8; border-radius: 14px;
      background: #fff; color: #8b8fe8; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .send-code-btn:hover:not(:disabled) { background: #8b8fe8; color: #fff; }
    .send-code-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }

    .login-submit-btn {
      width: 100%; padding: 18px;
      font-size: 19px; font-weight: 700;
      border: none; border-radius: 16px;
      cursor: pointer; font-family: inherit;
      background: linear-gradient(135deg, #8b8fe8, #6e72d6);
      color: #fff;
      box-shadow: 0 8px 24px rgba(107,111,216,0.35);
      margin-top: 6px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .login-submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(107,111,216,0.45);
    }
    .login-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .hint {
      text-align: center; color: #aaa; font-size: 13px;
      margin-top: 18px; line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="page">

  <div class="top">
    <a href="/" class="back">← 返回</a>
    <span class="pill">Pre Release</span>
  </div>

  <div class="card">
    <div class="card-inner">

      <div class="logo-area">
        <h1>📱 登录 / 注册</h1>
        <p>输入手机号，开启搭子之旅</p>
      </div>

      <div id="msg" class="msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="phone">手机号</label>
          <div class="phone-row">
            <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11" autocomplete="tel" inputmode="numeric">
            <button type="button" id="send-code-btn" class="send-code-btn">获取验证码</button>
          </div>
        </div>

        <div class="form-group">
          <label for="code">验证码</label>
          <input type="text" id="code" placeholder="请输入验证码" maxlength="6" autocomplete="one-time-code" inputmode="numeric">
        </div>

        <button type="submit" id="submit-btn" class="login-submit-btn">登录 / 注册</button>
      </form>

      <p class="hint">首次登录即自动注册，验证码为 1234（测试环境）</p>

    </div>
  </div>

</div>

<script src="common.js"></script>
<script>
  const form = document.getElementById('login-form');
  const phoneInput = document.getElementById('phone');
  const codeInput = document.getElementById('code');
  const sendCodeBtn = document.getElementById('send-code-btn');
  const submitBtn = document.getElementById('submit-btn');
  const msgBox = document.getElementById('msg');

  let countdown = 0;
  let countdownTimer = null;

  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'msg ' + type;
  }

  function hideMsg() { msgBox.className = 'msg'; }

  sendCodeBtn.addEventListener('click', async () => {
    const phone = phoneInput.value.trim();
    if (!phone || !/^\d{11}$/.test(phone)) {
      showMsg('请输入正确的11位手机号', 'error');
      return;
    }
    hideMsg(); sendCodeBtn.disabled = true;

    try {
      const res = await fetch('/api/auth/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const json = await res.json();
      if (json.success) {
        dzhToast('验证码已发送', 'success');
        countdown = 60; updateCountdown();
      } else {
        showMsg(json.message, 'error');
        sendCodeBtn.disabled = false;
      }
    } catch (err) {
      showMsg('网络错误，请稍后再试', 'error');
      sendCodeBtn.disabled = false;
    }
  });

  function updateCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      if (countdown <= 1) {
        clearInterval(countdownTimer);
        countdown = 0;
        sendCodeBtn.textContent = '重新获取';
        sendCodeBtn.disabled = false;
      } else {
        countdown--;
        sendCodeBtn.textContent = countdown + 's';
      }
    }, 1000);
    sendCodeBtn.textContent = countdown + 's';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const phone = phoneInput.value.trim();
    const code = codeInput.value.trim();

    if (!phone || !/^\d{11}$/.test(phone)) {
      showMsg('请输入正确的11位手机号', 'error'); return;
    }
    if (!code) {
      showMsg('请输入验证码', 'error'); return;
    }

    hideMsg(); submitBtn.disabled = true;
    submitBtn.textContent = '登录中...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, code })
      });
      const json = await res.json();

      if (json.success) {
        localStorage.setItem('token', json.data.token);
        localStorage.setItem('user', JSON.stringify({
          phone: json.data.phone,
          nickname: json.data.nickname,
          createdAt: json.data.createdAt || null
        }));
        dzhToast('登录成功，正在跳转...', 'success');
        setTimeout(() => { window.location.href = '/home.html'; }, 500);
      } else {
        showMsg(json.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = '登录 / 注册';
      }
    } catch (err) {
      showMsg('网络错误，请稍后再试', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '登录 / 注册';
    }
  });
</script>

</body>
</html>
